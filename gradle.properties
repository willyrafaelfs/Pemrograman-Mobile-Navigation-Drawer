# File: gradle.properties
# ========================
# Konfigurasi Gradle untuk project

# Mengaktifkan AndroidX (library modern pengganti Support Library)
android.useAndroidX=true

# Mengaktifkan Kotlin code generation (untuk performa build lebih baik)
kotlin.code.style=official

# Konfigurasi JVM untuk Gradle daemon
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Mengaktifkan non-transitive R class (best practice)
android.nonTransitiveRClass=true
